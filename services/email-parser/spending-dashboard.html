<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Spending Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0f0f0f;--ink-2:#3a3a3a;--ink-3:#7a7a7a;--ink-4:#b0b0a8;
  --paper:#fafaf7;--surface:#f2f2ed;
  --accent:#1a472a;--accent-2:#e4f2e8;
  --warn:#b85000;--warn-bg:#fff4ec;
  --red:#b01a1a;--red-bg:#fae8e8;
  --border:#deded6;--rule:#ebebe3;
  --green:#1a6b35;--green-bg:#e4f2e8;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
.page{max-width:920px;margin:0 auto;padding:40px 28px 80px}
h1{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;letter-spacing:-0.02em;line-height:1.15}
h2{font-family:'Syne',sans-serif;font-weight:700;font-size:21px}
.meta{font-size:12px;color:var(--ink-3);margin-top:6px}
.meta-badge{display:inline-block;background:var(--surface);padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600;margin-right:6px}
.sec{margin-top:48px}
.sh{display:flex;align-items:baseline;gap:14px;margin-bottom:18px}
.sn{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink-4);min-width:28px}
.st{font-family:'Syne',sans-serif;font-size:21px;font-weight:700}
.sec-label{display:block;font-family:'Syne',sans-serif;font-size:12px;color:var(--ink-2);text-transform:uppercase;letter-spacing:0.06em;margin-top:22px;margin-bottom:10px}

/* ── Metric Cards (dgrid) ── */
.dgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.dc{background:#fff;border:1px solid var(--border);border-radius:11px;padding:17px 18px 15px}
.dc.feat{background:var(--ink);border-color:var(--ink)}
.dc.gc{background:var(--accent-2);border-color:var(--accent-2)}
.dc.wc{background:var(--warn-bg);border-color:var(--warn-bg)}
.dcl{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--ink-3);margin-bottom:6px;font-weight:500}
.dcl.lt{color:rgba(255,255,255,.5)}
.dcn{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:5px;line-height:1.1}
.dcn.lt{color:#fff}
.dcn.g{color:var(--accent)}
.dcn.w{color:var(--warn)}
.dcn.r{color:var(--red)}
.dcs{font-size:12px;color:var(--ink-3)}
.dcs.lt{color:rgba(255,255,255,.45)}

/* ── Personality Card ── */
.persona{background:var(--ink);color:#fff;border-radius:14px;padding:28px 26px;margin-top:16px}
.persona-emoji{font-size:42px;margin-bottom:8px}
.persona-type{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:6px}
.persona-desc{font-size:14px;opacity:.7;line-height:1.5;margin-bottom:14px}
.persona-traits{display:flex;gap:8px;flex-wrap:wrap}
.persona-trait{background:rgba(255,255,255,.1);padding:4px 12px;border-radius:20px;font-size:11.5px;font-weight:500}

/* ── Health Score (ss) ── */
.ss{background:var(--ink);color:#fff;border-radius:14px;padding:26px 24px}
.sst{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;opacity:.5;margin-bottom:8px}
.ssn{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:4px}
.ssd{font-size:13px;opacity:.6;margin-bottom:20px}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.sdl{font-size:11px;opacity:.45;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.sdv{font-family:'Syne',sans-serif;font-size:26px;font-weight:800}
.sdv.g{color:#7af0a0}.sdv.a{color:#f0d870}.sdv.r{color:#f08080}
.sds{font-size:11px;opacity:.45;margin-top:4px;margin-bottom:8px}
.sdt{height:4px;background:rgba(255,255,255,.12);border-radius:2px}
.sdf{height:100%;border-radius:2px}

/* ── Your Numbers (ugrid) ── */
.ugrid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.uc{background:#fff;border:1px solid var(--border);border-radius:11px;padding:16px 18px}
.uc-icon{font-size:22px;margin-bottom:6px}
.uc-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:3px;line-height:1.1}
.uc-label{font-size:12px;font-weight:500;color:var(--ink-2);margin-bottom:3px}
.uc-detail{font-size:11px;color:var(--ink-3)}

/* ── Real-World Equivalents ── */
.rwgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.rw{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.rwi{font-size:22px}
.rwv{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--accent)}
.rwl{font-size:12px;color:var(--ink-2);font-weight:500}
.rws{font-size:11px;color:var(--ink-3)}

/* ── Category Breakdown ── */
.aa-bar{display:flex;height:32px;border-radius:8px;overflow:hidden;margin-bottom:14px}
.aa-seg{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;min-width:30px;padding:0 4px;white-space:nowrap;overflow:hidden}
.aa-legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.aa-item{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-2)}
.aa-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.cat-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.cat-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
.cat-card-bar{position:absolute;bottom:0;left:0;height:3px}
.cat-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:4px}
.cat-amount{font-family:'Syne',sans-serif;font-size:18px;font-weight:800}
.cat-meta{font-size:11px;color:var(--ink-3)}

/* ── Merchant Table ── */
.ft-wrap{border:1px solid var(--border);border-radius:12px;overflow:hidden}
.ft{width:100%;border-collapse:collapse}
.ft th{font-family:'Syne',sans-serif;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;background:var(--surface);color:var(--ink-3);padding:10px 14px;text-align:left}
.ft td{padding:11px 14px;border-top:1px solid var(--rule);font-size:13px;color:var(--ink-2);vertical-align:middle}
.ft-name{font-weight:600;color:var(--ink);font-size:13px}
.ft-sub{font-size:11px;color:var(--ink-3)}
.ft-rank{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--ink-4);min-width:24px}
.ft-bar{height:6px;background:var(--surface);border-radius:3px;margin-top:4px;overflow:hidden}
.ft-bar-fill{height:100%;border-radius:3px}

/* ── Spending Patterns ── */
.pat-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.pat-box{background:#fff;border:1px solid var(--border);border-radius:11px;padding:18px}
.pat-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{font-size:12px;min-width:36px;text-align:right;color:var(--ink-3);font-weight:500}
.bar-track{flex:1;height:22px;background:var(--surface);border-radius:5px;position:relative;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;display:flex;align-items:center;padding-left:8px;min-width:2px}
.bar-val{font-size:10px;font-weight:600;color:#fff;white-space:nowrap}
.bar-val.out{position:absolute;left:calc(100% + 8px);color:var(--ink-2);top:50%;transform:translateY(-50%)}
/* Hourly chart */
.hour-chart{display:flex;align-items:flex-end;gap:2px;height:80px;margin-top:8px}
.hour-bar{flex:1;background:var(--accent);border-radius:2px 2px 0 0;min-width:4px;position:relative;cursor:default;transition:opacity .15s}
.hour-bar:hover{opacity:.7}
.hour-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--ink-4);margin-top:4px}

/* ── Heatmap ── */
.hm-table{width:100%;border-collapse:collapse}
.hm-table th{padding:6px 4px;font-family:'Syne',sans-serif;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);text-align:center}
.hm-table td{padding:3px;text-align:center}
.hm-cell{border-radius:4px;padding:6px 2px;font-size:10px;font-weight:500;min-height:28px;display:flex;align-items:center;justify-content:center}

/* ── What-If ── */
.wi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.wi{background:#fff;border:1px solid var(--border);border-radius:11px;padding:17px}
.wi-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:4px}
.wi-desc{font-size:12.5px;color:var(--ink-2);font-style:italic;line-height:1.45;margin-bottom:12px}
.wi-row{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-bottom:1px solid var(--rule)}
.wi-row:last-of-type{border-bottom:none}
.wi-label{color:var(--ink-3)}
.wi-diff{margin-top:10px;padding:10px;border-radius:8px;text-align:center;font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.wi-diff.save{background:var(--accent-2);color:var(--accent)}
.wi-diff.grow{background:var(--accent-2);color:var(--accent)}
.wi-diff.warn{background:var(--warn-bg);color:var(--warn)}
.wi-framing{font-size:12px;color:var(--ink-2);line-height:1.5;padding:8px 10px;background:var(--surface);border-radius:6px;margin-top:8px}

/* ── Insight Cards ── */
.ins-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.ins-card{border-radius:16px;padding:22px;min-height:160px;display:flex;flex-direction:column;justify-content:flex-end;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative}
.ins-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.ins-badge{position:absolute;top:14px;right:14px;font-size:9px;background:rgba(255,255,255,.25);padding:2px 8px;border-radius:10px}
.ins-icon{font-size:28px;margin-bottom:6px}
.ins-big{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;line-height:1}
.ins-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;line-height:1.3;margin-top:6px}
.ins-sub{font-size:12px;opacity:.75;margin-top:4px;line-height:1.4}

/* ── Top Items ── */
.th-list{display:flex;flex-direction:column;gap:6px}
.th-row{display:flex;align-items:center;gap:12px;padding:8px 12px;background:#fff;border:1px solid var(--border);border-radius:8px}
.th-rank{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--ink-4);min-width:20px}
.th-name{flex:1;font-size:13px;font-weight:500}
.th-merch{font-size:11px;color:var(--ink-3)}
.th-count{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--accent);min-width:40px;text-align:right}
.th-amt{font-size:12px;color:var(--ink-3);min-width:70px;text-align:right}

/* ── Actionables ── */
.ac{display:flex;gap:13px;padding:13px 15px;background:#fff;border:1px solid var(--border);border-radius:10px;margin-bottom:8px}
.aci{font-size:20px;flex-shrink:0;padding-top:2px}
.act{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.acd{font-size:12.5px;color:var(--ink-2);line-height:1.5}
.acm{font-size:11px;background:var(--surface);padding:2px 8px;border-radius:4px;display:inline-block;margin-top:4px}
.acscore{font-size:10px;padding:3px 8px;border-radius:12px;font-weight:700;background:var(--accent-2);color:var(--accent)}

/* ── Slideshow Dialog ── */
.dialog-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(6px)}
.dialog-overlay.open{display:flex}
.dialog-box{width:420px;max-width:92vw;max-height:90vh;position:relative}
.dialog-close{position:absolute;top:-44px;right:0;width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.slide{border-radius:20px;padding:36px 28px 32px;min-height:340px;display:flex;flex-direction:column;animation:slideIn .3s ease}
.slide-step{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;opacity:.5;margin-bottom:12px}
.slide-slot{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.slide-big{font-family:'Syne',sans-serif;font-size:48px;font-weight:800}
.slide-big-label{font-size:13px;opacity:.6;margin-bottom:12px}
.slide-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;line-height:1.2;margin-bottom:8px}
.slide-body{font-size:15px;line-height:1.7;flex:1;white-space:pre-line}
.slide-nav{display:flex;justify-content:space-between;align-items:center;margin-top:20px}
.slide-btn{width:44px;height:44px;border-radius:50%;border:2px solid;background:transparent;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.slide-btn:disabled{opacity:.2;cursor:default}
.slide-dots{display:flex;gap:6px;align-items:center}
.slide-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2)}
.slide-dot.active{width:24px;border-radius:4px;opacity:.7}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* ── Responsive ── */
@media(max-width:720px){
  .dgrid,.ugrid,.sgrid,.rwgrid,.cat-cards{grid-template-columns:repeat(2,1fr)}
  .ins-grid{grid-template-columns:repeat(2,1fr)}
  .wi-grid,.pat-grid{grid-template-columns:1fr}
  .page{padding:24px 16px 60px}
  .dialog-box{width:100%;max-width:100%;margin:0 12px}
}
.pos{color:var(--accent);font-weight:600}
.neg{color:var(--red);font-weight:600}

/* ── Loading / Error ── */
.loading{text-align:center;padding:80px 20px;color:var(--ink-3)}
.loading h2{color:var(--ink);margin-bottom:8px}
</style>
</head>

const SLOT_STYLES = {
  'The Data':{bg:'#FDCB6E',fg:'#2d2d2d'},
  'The Numbers':{bg:'#FDCB6E',fg:'#2d2d2d'},
  'Distribution':{bg:'#FDCB6E',fg:'#2d2d2d'},
  'Why It Matters':{bg:'#0984E3',fg:'#fff'},
  'What This Means':{bg:'#0984E3',fg:'#fff'},
  'The Insight':{bg:'#00B894',fg:'#fff'},
  'The Takeaway':{bg:'#FF6B35',fg:'#fff'},
};
let currentCards=[], currentSlide=0, currentKey='';

function INR(n){
  if(n==null) return '-';
  const a=Math.abs(n);
  if(a>=1e7) return (n<0?'-':'')+'Rs '+(a/1e7).toFixed(2)+' Cr';
  if(a>=1e5) return (n<0?'-':'')+'Rs '+(a/1e5).toFixed(2)+' L';
  return (n<0?'-':'')+'Rs '+Math.round(a).toLocaleString('en-IN');
}
function pct(n){return (n>0?'+':'')+n.toFixed(1)+'%'}
function scoreGrade(s,max){
  const pct=s/max;
  return pct>=0.7?'g':pct>=0.4?'a':'r';
}
function scoreBar(g){return g==='g'?'#7af0a0':g==='a'?'#f0d870':'#f08080'}

function openSlideshow(key,cards){
  currentCards=cards; currentSlide=0; currentKey=key;
  let ov=document.querySelector('.dialog-overlay');
  if(!ov){
    ov=document.createElement('div');
    ov.className='dialog-overlay';
    ov.innerHTML='<div class="dialog-box"><button class="dialog-close" onclick="closeSlideshow()">&times;</button><div id="slide-container"></div></div>';
    document.body.appendChild(ov);
    ov.addEventListener('click',e=>{if(e.target===ov)closeSlideshow()});
  }
  ov.classList.add('open');
  document.body.style.overflow='hidden';
  renderSlide();
}
function closeSlideshow(){
  const ov=document.querySelector('.dialog-overlay');
  if(ov)ov.classList.remove('open');
  document.body.style.overflow='';
}
function goSlide(dir){
  const next=currentSlide+dir;
  if(next<0||next>=currentCards.length)return;
  currentSlide=next;renderSlide();
}
function renderSlide(){
  const c=currentCards[currentSlide];
  const ss=SLOT_STYLES[c.slot]||{bg:'#636E72',fg:'#fff'};
  const cont=document.getElementById('slide-container');
  const total=currentCards.length;
  let dotsH='';
  for(let i=0;i<total;i++){
    dotsH+=`<div class="slide-dot${i===currentSlide?' active':''}" style="background:${i===currentSlide?ss.fg:('rgba('+(ss.fg==='#fff'?'255,255,255':'45,45,45')+',.2)')}"></div>`;
  }
  cont.innerHTML=`<div class="slide" style="background:${ss.bg};color:${ss.fg}">
    <div class="slide-step">Card ${currentSlide+1} of ${total}</div>
    <div class="slide-slot">${c.slot||''}</div>
    ${c.highlightValue?`<div class="slide-big">${c.highlightValue}</div>`:``}
    <div class="slide-title">${c.title}</div>
    <div class="slide-body">${c.body}</div>
    <div class="slide-nav">
      <button class="slide-btn" onclick="goSlide(-1)" ${currentSlide===0?'disabled':''} style="border-color:${ss.fg};color:${ss.fg}">&larr;</button>
      <div class="slide-dots">${dotsH}</div>
      <button class="slide-btn" onclick="goSlide(1)" ${currentSlide===total-1?'disabled':''} style="border-color:${ss.fg};color:${ss.fg}">&rarr;</button>
    </div>
  </div>`;
}

document.addEventListener('keydown',e=>{
  if(!document.querySelector('.dialog-overlay.open'))return;
  if(e.key==='ArrowRight'||e.key===' ')goSlide(1);
  else if(e.key==='ArrowLeft')goSlide(-1);
  else if(e.key==='Escape')closeSlideshow();
});

        <div class="hour-chart">
          ${d.hourlyPattern.map(hp=>{
            const pct=maxHourAmt>0?(hp.amount/maxHourAmt*100):0;
            return `<div class="hour-bar" style="height:${Math.max(2,pct)}%;opacity:${hp.count>0?1:0.15}" title="${hp.label}: ${INR(hp.amount)} (${hp.count} orders)"></div>`;
          }).join('')}
        </div>
        <div class="hour-labels"><span>12 AM</span><span>6 AM</span><span>12 PM</span><span>6 PM</span><span>11 PM</span></div>
      </div>
    </div>
  </div>`;

  // ── 09 Monthly Heatmap ──
  const allMonthAmounts=d.monthlyHeatmap.flatMap(y=>y.months.map(m=>m.amount));
  const maxMonthAmt=Math.max(...allMonthAmounts.filter(a=>a>0));
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  h+=`<div class="sec">
    <div class="sh"><span class="sn">09</span><span class="st">Monthly Spending Heatmap</span></div>
    <table class="hm-table">
      <thead><tr><th></th>${months.map(m=>`<th>${m}</th>`).join('')}<th>Total</th></tr></thead>
      <tbody>
        ${d.monthlyHeatmap.map(yr=>`<tr>
          <td style="font-family:'Syne';font-weight:700;font-size:12px">${yr.year}</td>
          ${yr.months.map(m=>{
            if(!m.amount) return '<td><div class="hm-cell" style="background:transparent;color:var(--ink-4)">-</div></td>';
            const intensity=Math.max(0.08,m.amount/maxMonthAmt);
            const bg=`rgba(26,71,42,${intensity})`;
            const color=intensity>0.5?'#fff':'var(--ink-2)';
            return `<td><div class="hm-cell" style="background:${bg};color:${color}" title="${months[m.month]} ${yr.year}: ${m.count} orders">${INR(m.amount)}</div></td>`;
          }).join('')}
          <td><div class="hm-cell" style="font-weight:700;font-family:'Syne';font-size:11px">${INR(yr.total)}</div></td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;

  // ── 10 What-If Scenarios ──
  if(d.whatIfScenarios.length){
    h+=`<div class="sec">
      <div class="sh"><span class="sn">10</span><span class="st">What If...</span></div>
      <div class="wi-grid">
        ${d.whatIfScenarios.map(w=>{
          const cls=w.better?'grow':'save';
          return `<div class="wi">
            <div class="wi-name">${w.name}</div>
            <div class="wi-desc">${w.description}</div>
            <div class="wi-row"><span class="wi-label">Your Spend</span><span>${INR(w.yourValue)}</span></div>
            <div class="wi-row"><span class="wi-label">Hypothetical</span><span>${INR(w.hypothetical)}</span></div>
            <div class="wi-row"><span class="wi-label">Difference</span><span class="${w.better?'pos':'neg'}">${INR(w.diff)}</span></div>
            <div class="wi-diff ${cls}">${w.better?'Growth potential':'Potential savings'}: ${INR(w.diff)}</div>
            <div class="wi-framing">${w.framing}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  // ── 11 Insights ──
  if(d.insights.length){
    // Store journeys globally for slideshow
    window.__JOURNEYS__={};
    d.insights.forEach(ins=>{
      if(ins.journey&&ins.journey.length) window.__JOURNEYS__[ins.key]=ins.journey;
    });

    h+=`<div class="sec">
      <div class="sh"><span class="sn">11</span><span class="st">Spending Insights</span></div>
      <div class="ins-grid">
        ${d.insights.map(ins=>{
          const hasJourney=ins.journey&&ins.journey.length;
          const onclick=hasJourney?` onclick="openSlideshow('${ins.key}',window.__JOURNEYS__['${ins.key}'])"`:''
          return `<div class="ins-card"${onclick} style="background:${ins.color.bg};color:${ins.color.fg}${hasJourney?';cursor:pointer':''}">
            <div class="ins-badge">${ins.relevance}</div>
            <div class="ins-icon">${ins.icon}</div>
            <div class="ins-big">${ins.bigNumber}</div>
            <div class="ins-title">${ins.title}</div>
            <div class="ins-sub">${ins.subtitle}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  // ── 12 Top Items ──
  if(d.topItems.length){
    h+=`<div class="sec">
      <div class="sh"><span class="sn">12</span><span class="st">Most Ordered Items</span></div>
      <div class="th-list">
        ${d.topItems.slice(0,10).map((item,i)=>`<div class="th-row">
          <div class="th-rank">${i+1}</div>
          <div style="flex:1">
            <div class="th-name">${item.name}</div>
            <div class="th-merch">${item.merchant}</div>
          </div>
          <div class="th-count">${item.count}x</div>
          <div class="th-amt">${INR(item.totalSpent)}</div>
        </div>`).join('')}
      </div>
    </div>`;
  }

  // ── 13 Actionables ──
  if(d.actionables.length){
    h+=`<div class="sec">
      <div class="sh"><span class="sn">13</span><span class="st">Things to Consider</span></div>
      ${d.actionables.map(a=>`<div class="ac">
        <div class="aci">${a.icon}</div>
        <div style="flex:1">
          <div class="act">${a.title} <span class="acscore">${a.score}</span></div>
          <div class="acd">${a.description}</div>
          <div class="acm">${a.metadata}</div>
        </div>
      </div>`).join('')}
    </div>`;
  }

  // Footer
  h+=`<div style="margin-top:60px;text-align:center;font-size:11px;color:var(--ink-4)">
    Generated on ${new Date(d.generatedAt).toLocaleDateString('en-IN',{month:'long',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'})}
    &middot; Data from email receipts
  </div>`;

  app.innerHTML=h;
}

// Sender key → color mapping for merchant bars
const SENDER_KEY_TO_CATEGORY={
  swiggy:{color:'#FF6B35'},
  'swiggy-instamart':{color:'#00B894'},
  uber:{color:'#0984E3'},
  ola:{color:'#0984E3'},
  apple:{color:'#6C5CE7'},
  'google-play':{color:'#6C5CE7'},
  zomato:{color:'#FF6B35'},
  amazon:{color:'#E17055'},
  flipkart:{color:'#E17055'},
  bigbasket:{color:'#00B894'},
  blinkit:{color:'#00B894'},
};

// ── Data Loading ────────────────────────────────────────────────────────────
fetch('./spending-dashboard-data.json')
  .then(r=>{if(!r.ok)throw new Error(r.status);return r.json()})
  .then(render)
  .catch(()=>{
    if(window.__DASHBOARD_DATA__){
      render(window.__DASHBOARD_DATA__);
    } else {
      document.getElementById('app').innerHTML=`<div class="loading">
        <h2>Could not load data</h2>
        <p>Run: <code>npx ts-node -r tsconfig-paths/register src/scripts/generate-spending-data.ts</code></p>
        <p>This creates spending-dashboard-data.json in the same directory.</p>
      </div>`;
    }
  });
</script>
