# Email classification rules
# Matched in order — first match wins
# Used when no specific parser config matches (fallback classification)

categories:
  # --- Consumer Invoices: Food Delivery ---
  - senderDomains: [swiggy.in]
    subjectPattern: "(delivered|order confirmation|order placed)"
    subjectExcludePattern: "Instamart|grocery"
    category: consumer_invoice
    subcategory: food_delivery
    senderKey: swiggy
    senderDisplayName: Swiggy

  - senderDomains: [swiggy.in]
    subjectPattern: "Instamart|grocery"
    category: consumer_invoice
    subcategory: grocery
    senderKey: swiggy-instamart
    senderDisplayName: Swiggy Instamart

  - senderDomains: [zomato.com]
    subjectPattern: "(delivered|order)"
    category: consumer_invoice
    subcategory: food_delivery
    senderKey: zomato
    senderDisplayName: Zomato

  # --- Consumer Invoices: Transport ---
  - senderDomains: [uber.com]
    subjectPattern: "trip|ride"
    category: consumer_invoice
    subcategory: transport
    senderKey: uber
    senderDisplayName: Uber

  - senderDomains: [olacabs.com]
