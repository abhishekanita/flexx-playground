<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:#0f0f0f;--ink-2:#3a3a3a;--ink-3:#7a7a7a;--ink-4:#b0b0a8;
    --paper:#fafaf7;--surface:#f2f2ed;
    --accent:#1a472a;--accent-2:#e4f2e8;
    --warn:#b85000;--warn-bg:#fff4ec;
    --tax:#1a3a5c;--tax-bg:#e6eef8;
    --behav:#5c1a3a;--behav-bg:#f8e6f0;
    --whatif:#3a1a5c;--whatif-bg:#ede6f8;
    --red:#b01a1a;--red-bg:#fae8e8;
    --border:#deded6;--rule:#ebebe3;
    --green:#1a6b35;--green-bg:#e4f2e8;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);font-size:15px;line-height:1.65;}
  .page{max-width:920px;margin:0 auto;padding:48px 32px 80px;}

  /* HEADER */
  .doc-header{border-bottom:2.5px solid var(--ink);padding-bottom:28px;margin-bottom:52px;}
  .label{font-family:'Syne',sans-serif;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);margin-bottom:10px;}
  .doc-header h1{font-family:'Syne',sans-serif;font-size:33px;font-weight:800;line-height:1.15;margin-bottom:10px;}
  .doc-header .sub{color:var(--ink-2);font-size:15px;font-weight:300;max-width:640px;margin-bottom:18px;}
  .meta-row{display:flex;gap:7px;flex-wrap:wrap;}
  .mc{font-size:11.5px;background:var(--surface);padding:4px 12px;border-radius:20px;color:var(--ink-2);border:1px solid var(--border);}
  .mch{font-size:11.5px;background:#fffbe0;padding:4px 12px;border-radius:20px;color:#6b4a00;border:1px solid #f0d870;font-weight:600;}

  /* SECTION */
  .section{margin-bottom:58px;}
  .sh{display:flex;align-items:baseline;gap:14px;margin-bottom:24px;padding-bottom:12px;border-bottom:1px solid var(--rule);}
  .sn{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--ink-4);letter-spacing:.12em;text-transform:uppercase;min-width:28px;}
  .st{font-family:'Syne',sans-serif;font-size:21px;font-weight:700;}
  .sec-label{font-family:'Syne',sans-serif;font-size:12px;color:var(--ink-2);text-transform:uppercase;letter-spacing:.06em;margin:22px 0 10px;display:block;}

  /* DASH GRID */
  .dgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:22px;}
  .dc{background:#fff;border:1px solid var(--border);border-radius:11px;padding:17px 15px;}
  .dc.feat{background:var(--ink);color:#fff;border-color:var(--ink);}
  .dc.wc{background:var(--warn-bg);border-color:#f5c890;}
  .dc.gc{background:var(--accent-2);border-color:rgba(26,71,42,.25);}
  .dcl{font-size:11px;color:var(--ink-3);margin-bottom:7px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;}
  .dcl.lt{color:rgba(255,255,255,.45);}
  .dcn{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;line-height:1;margin-bottom:5px;}
  .dcn.g{color:var(--accent);} .dcn.w{color:var(--warn);} .dcn.r{color:var(--red);} .dcn.lt{color:#fff;}
  .dcs{font-size:12px;color:var(--ink-3);line-height:1.4;}
  .dcs.lt{color:rgba(255,255,255,.5);}
  .dbar{height:5px;background:var(--surface);border-radius:3px;margin-top:9px;overflow:hidden;}
  .dbar.lt{background:rgba(255,255,255,.12);}
  .dbar-f{height:100%;border-radius:3px;}

  /* FITNESS SCORE (dark card) */
  .ss{background:var(--ink);color:#fff;border-radius:14px;padding:26px 26px 22px;margin-bottom:22px;}
  .sst{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;opacity:.5;text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;}
  .ssn{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:4px;}
  .ssd{font-size:13px;opacity:.6;margin-bottom:20px;}
  .sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  .sdl{font-size:11px;opacity:.45;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}
  .sdv{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-bottom:2px;}
  .sdv.g{color:#7af0a0;} .sdv.a{color:#f0d870;} .sdv.r{color:#f08080;}
  .sds{font-size:11px;opacity:.45;}
  .sdt{height:4px;background:rgba(255,255,255,.12);border-radius:2px;margin-top:7px;}
  .sdf{height:100%;border-radius:2px;}

  /* UNIQUE NUMBERS */
  .ugrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
  .uc{background:#fff;border:1px solid var(--border);border-radius:10px;padding:15px;}
  .uci{font-size:18px;margin-bottom:7px;}
  .ucn{font-family:'Syne',sans-serif;font-size:11.5px;font-weight:700;margin-bottom:4px;color:var(--ink-2);text-transform:uppercase;letter-spacing:.05em;}
  .uce{font-size:13px;color:var(--ink);margin-bottom:4px;}
  .uce strong{font-family:'Syne',sans-serif;font-size:20px;display:block;margin-bottom:2px;}
  .ucw{font-size:11.5px;color:var(--ink-3);line-height:1.4;}

  /* REAL WORLD */
  .rwgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
  .rw{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
  .rwi{font-size:22px;margin-bottom:5px;}
  .rwv{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--accent);margin-bottom:3px;}
  .rwl{font-size:12px;color:var(--ink-2);font-weight:500;}
  .rws{font-size:11px;color:var(--ink-3);}

  /* BENCHMARK BARS */
  .bench-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
  .bench-row{display:flex;align-items:center;gap:12px;}
  .bench-name{font-size:12.5px;min-width:140px;text-align:right;color:var(--ink-2);}
  .bench-name.port{font-weight:700;color:var(--ink);}
  .bench-bar-wrap{flex:1;height:24px;background:var(--surface);border-radius:6px;overflow:hidden;position:relative;}
  .bench-bar{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:8px;}
  .bench-val{font-size:11px;font-weight:600;color:#fff;white-space:nowrap;}
  .bench-val.out{color:var(--ink-2);position:absolute;left:calc(100% + 8px);top:50%;transform:translateY(-50%);font-size:11px;}

  /* FOLIO TABLE */
  .ft-wrap{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;}
  .ft{width:100%;border-collapse:collapse;}
  .ft th{padding:9px 13px;text-align:left;font-family:'Syne',sans-serif;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-3);background:var(--surface);border-bottom:1px solid var(--border);}
  .ft th:not(:first-child){text-align:right;}
  .ft td{padding:10px 13px;font-size:13px;border-bottom:1px solid var(--rule);vertical-align:middle;color:var(--ink-2);}
  .ft td:not(:first-child){text-align:right;}
  .ft tr:last-child td{border-bottom:none;}
  .fn2{font-weight:600;color:var(--ink);font-size:13px;}
  .fnsub{font-size:11px;color:var(--ink-3);}
  .pos{color:var(--accent);font-weight:600;} .neg{color:var(--red);font-weight:600;} .neut{color:var(--ink-3);}
  .xb{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;}
  .xh{background:var(--accent-2);color:var(--accent);} .xm{background:#fff4ec;color:var(--warn);} .xl{background:var(--red-bg);color:var(--red);}

  /* FUND CARDS */
  .fcgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px;}
  .fc{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;position:relative;}
  .fc-name{font-weight:600;font-size:13px;margin-bottom:4px;padding-right:60px;}
  .fc-meta{font-size:11.5px;color:var(--ink-3);margin-bottom:8px;}
  .fc-row{display:flex;gap:16px;font-size:12px;color:var(--ink-2);}
  .fc-row span{display:flex;align-items:center;gap:4px;}
  .fc-badge{position:absolute;top:14px;right:14px;font-size:10px;padding:3px 8px;border-radius:12px;font-weight:700;}
  .fc-badge.up{background:var(--accent-2);color:var(--accent);}
  .fc-badge.dn{background:var(--red-bg);color:var(--red);}
  .fc-badge.eq{background:var(--surface);color:var(--ink-3);}

  /* WHAT-IF */
  .wi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;}
  .wi{background:#fff;border:1px solid var(--border);border-radius:11px;padding:17px;position:relative;overflow:hidden;}
  .wi-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:12px;}
  .wi-row{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-bottom:1px solid var(--surface);}
  .wi-row:last-of-type{border-bottom:none;}
  .wi-label{color:var(--ink-3);}
  .wi-diff{margin-top:12px;padding:10px;border-radius:8px;text-align:center;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;}
  .wi-diff.better{background:var(--accent-2);color:var(--accent);}
  .wi-diff.worse{background:var(--warn-bg);color:var(--warn);}
  .wi-desc{font-size:12.5px;color:var(--ink-2);margin-bottom:10px;line-height:1.45;font-style:italic;}
  .wi-framing{font-size:12px;color:var(--ink-2);margin-top:10px;line-height:1.5;padding:8px 10px;background:var(--surface);border-radius:6px;}

  /* RISK */
  .risk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
  .ri{background:#fff;border:1px solid var(--border);border-radius:10px;padding:15px;text-align:center;}
  .riv{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:3px;}
  .ril{font-size:11.5px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;}

  /* INSIGHT CARDS GRID */
  .ins-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
  .ins-card{border-radius:16px;padding:22px 20px;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden;min-height:160px;display:flex;flex-direction:column;justify-content:flex-end;}
  .ins-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.12);}
  .ins-card.pending{opacity:.4;cursor:default;filter:grayscale(.6);}
  .ins-card.pending:hover{transform:none;box-shadow:none;}
  .ins-cat{font-family:'Syne',sans-serif;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;opacity:.7;margin-bottom:8px;}
  .ins-big{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;line-height:1;margin-bottom:6px;}
  .ins-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;line-height:1.3;margin-bottom:4px;}
  .ins-sub{font-size:12px;opacity:.75;line-height:1.4;}
  .ins-badge{position:absolute;top:14px;right:14px;font-size:9px;padding:3px 8px;border-radius:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;background:rgba(255,255,255,.25);backdrop-filter:blur(4px);}
  .ins-icon{font-size:28px;margin-bottom:8px;}

  /* CATEGORY HEADERS */
  .cat-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;margin-top:28px;}
  .cat-header:first-of-type{margin-top:0;}
  .cat-icon{font-size:20px;}
  .cat-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;}
  .cat-count{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:700;}

  /* SLIDESHOW DIALOG */
  .dialog-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:1000;align-items:center;justify-content:center;}
  .dialog-overlay.open{display:flex;}
  .dialog-box{width:420px;max-width:92vw;max-height:90vh;position:relative;}
  .dialog-close{position:absolute;top:-44px;right:0;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
  .dialog-close:hover{background:rgba(255,255,255,.3);}
  .slide{border-radius:20px;padding:36px 28px 32px;min-height:340px;display:flex;flex-direction:column;animation:slideIn .3s ease;}
  @keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
  .slide-step{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;opacity:.5;margin-bottom:16px;}
  .slide-slot{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}
  .slide-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;line-height:1.2;margin-bottom:14px;}
  .slide-big{font-family:'Syne',sans-serif;font-size:48px;font-weight:800;line-height:1;margin-bottom:6px;}
  .slide-big-label{font-size:13px;opacity:.6;margin-bottom:14px;}
  .slide-body{font-size:15px;line-height:1.7;flex:1;}
  .slide-nav{display:flex;align-items:center;justify-content:space-between;margin-top:20px;padding-top:16px;}
  .slide-btn{width:44px;height:44px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:transparent;color:inherit;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .slide-btn:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.5);}
  .slide-btn:disabled{opacity:.2;cursor:default;}
  .slide-btn:disabled:hover{background:transparent;border-color:rgba(255,255,255,.3);}
  .slide-dots{display:flex;gap:6px;}
  .slide-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);transition:all .2s;}
  .slide-dot.active{width:24px;border-radius:4px;background:rgba(255,255,255,.7);}

  @media(max-width:720px){.ins-grid{grid-template-columns:repeat(2,1fr);}.dialog-box{width:100%;max-width:100%;margin:0 12px;}}

  /* ACTIONABLES */
  .ac{display:flex;gap:13px;padding:13px 15px;background:#fff;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;}
  .aci{font-size:20px;flex-shrink:0;padding-top:2px;}
  .act{font-weight:600;font-size:14px;margin-bottom:2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .acd{font-size:12.5px;color:var(--ink-2);margin-bottom:6px;line-height:1.5;}
  .acm{font-size:11px;background:var(--surface);padding:2px 8px;border-radius:4px;color:var(--ink-3);display:inline-block;}
  .acscore{font-size:10px;padding:3px 8px;border-radius:12px;font-weight:700;background:var(--accent-2);color:var(--accent);}

  /* HEATMAP */
  .hm-table{width:100%;border-collapse:collapse;margin-bottom:14px;}
  .hm-table th{padding:6px 4px;font-family:'Syne',sans-serif;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-4);text-align:center;}
  .hm-table td{padding:3px;text-align:center;}
  .hm-cell{border-radius:4px;padding:6px 2px;font-size:10px;font-weight:500;min-height:28px;display:flex;align-items:center;justify-content:center;}

  /* ASSET ALLOC */
  .aa-bar{display:flex;height:32px;border-radius:8px;overflow:hidden;margin-bottom:12px;}
  .aa-seg{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;min-width:30px;}
  .aa-legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px;}
  .aa-item{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-2);}
  .aa-dot{width:10px;height:10px;border-radius:3px;}

  /* TOP HOLDINGS */
  .th-list{display:flex;flex-direction:column;gap:6px;}
  .th-row{display:flex;align-items:center;gap:12px;padding:8px 12px;background:#fff;border:1px solid var(--border);border-radius:8px;}
  .th-rank{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--ink-4);min-width:20px;}
  .th-name{flex:1;font-size:13px;font-weight:500;}
  .th-wt{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--accent);}

  /* CALLOUT */
  .co{padding:15px 20px;border-radius:8px;margin-bottom:18px;font-size:13.5px;line-height:1.65;}
  .co-note{background:var(--surface);border:1px solid var(--border);color:var(--ink-2);}

  /* PEER PERCENTILE */
  .pp-hero{background:var(--ink);color:#fff;border-radius:14px;padding:26px;margin-bottom:16px;text-align:center;}
  .pp-hero .pp-top{font-size:44px;font-weight:800;line-height:1;margin-bottom:6px;}
  .pp-hero .pp-label{font-size:14px;opacity:.6;margin-bottom:4px;}
  .pp-hero .pp-type{font-size:16px;font-weight:600;color:#f0d870;}
  .pp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
  .pp-dim{background:#fff;border:1px solid var(--border);border-radius:10px;padding:15px;text-align:center;}
  .pp-dim-pct{font-size:26px;font-weight:700;line-height:1;margin-bottom:4px;}
  .pp-dim-name{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);margin-bottom:4px;}
  .pp-dim-desc{font-size:11px;color:var(--ink-3);}
  .pp-dim-bar{height:4px;background:var(--surface);border-radius:2px;margin-top:8px;overflow:hidden;}
  .pp-dim-bar-f{height:100%;border-radius:2px;}

  /* SHADOW INDEX */
  .si-hero{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
  .si-card{border-radius:11px;padding:20px;text-align:center;}
  .si-card.actual{background:#fff;border:1px solid var(--border);}
  .si-card.shadow{background:var(--surface);border:1px solid var(--border);}
  .si-card.alpha{background:var(--ink);color:#fff;}
  .si-card .si-label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;opacity:.6;}
  .si-card .si-val{font-size:24px;font-weight:700;line-height:1;}
  .si-fund-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
  .si-fund{display:flex;align-items:center;gap:12px;padding:8px 12px;background:#fff;border:1px solid var(--border);border-radius:8px;}
  .si-fund-name{flex:1;font-size:13px;font-weight:500;}
  .si-fund-alpha{font-size:14px;font-weight:700;}

  /* FI COUNTDOWN */
  .fi-target{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}
  .fi-target-label{font-size:12px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
  .fi-target-val{font-size:26px;font-weight:700;margin-bottom:10px;}
  .fi-progress{height:12px;background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:6px;}
  .fi-progress-f{height:100%;border-radius:6px;background:var(--accent);}
  .fi-progress-label{font-size:11px;color:var(--ink-3);text-align:right;}
  .fi-baseline{background:var(--ink);color:#fff;border-radius:14px;padding:26px;margin-bottom:16px;text-align:center;}
  .fi-baseline .fi-date{font-size:34px;font-weight:700;margin-bottom:4px;}
  .fi-baseline .fi-years{font-size:14px;opacity:.6;}
  .fi-baseline .fi-bl-label{font-size:12px;opacity:.5;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
  .fi-alt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
  .fi-alt{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
  .fi-alt.bear{background:var(--red-bg);border-color:rgba(176,26,26,.2);}
  .fi-alt .fi-alt-label{font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
  .fi-alt .fi-alt-date{font-size:20px;font-weight:700;margin-bottom:3px;}
  .fi-alt .fi-alt-years{font-size:11px;color:var(--ink-3);}

  p{margin-bottom:12px;color:var(--ink-2);font-size:14px;}

  @media(max-width:720px){
    .dgrid,.ugrid,.sgrid,.risk-grid,.rwgrid,.pp-grid,.fi-alt-grid{grid-template-columns:repeat(2,1fr);}
    .fcgrid,.wi-grid{grid-template-columns:1fr;}
    .si-hero{grid-template-columns:1fr;}
    .page{padding:24px 16px 60px;}
  }
</style>
</head>
<body>
<div class="page" id="app">
  <p style="color:var(--ink-3);text-align:center;padding:60px 0">Loading data...</p>
</div>

<script>
const INR = (n) => {
  if (n == null) return '—';
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (abs >= 1e7) return sign + '\u20B9' + (abs / 1e7).toFixed(2) + ' Cr';
  if (abs >= 1e5) return sign + '\u20B9' + (abs / 1e5).toFixed(2) + ' L';
  if (abs >= 1e3) return sign + '\u20B9' + Math.round(abs).toLocaleString('en-IN');
  return sign + '\u20B9' + Math.round(abs);
};
const pct = (n) => n == null ? '—' : (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
const pctPlain = (n) => n == null ? '—' : n.toFixed(2) + '%';
const scoreGrade = (s) => s >= 75 ? 'g' : s >= 45 ? 'a' : 'r';
const scoreBar = (s) => s >= 75 ? '#7af0a0' : s >= 45 ? '#f0d870' : '#f08080';
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const ACTIONABLE_ICONS = {
  switch_regular_to_direct: '\uD83D\uDD04',
  elss_unlock_calendar: '\uD83D\uDCC5',
  tax_harvest_window: '\u2702\uFE0F',
  consolidate_overlap: '\uD83E\uDDF9',
  revive_exit_dormant: '\u23F8\uFE0F',
  redirect_micro_holdings: '\uD83C\uDFF7\uFE0F',
  rebalance_after_drift: '\u2696\uFE0F',
  add_best_performer_dip: '\uD83D\uDCC8',
  set_sip_increase_reminder: '\uD83D\uDD14',
};

function render(d) {
  const ps = d.portfolioSummary;
  const db = d.dashboard;
  const fs = db.fitnessScore;
  const un = db.uniqueNumbers;
  const rm = d.riskMetrics;
  const hs = db.heroStats;

  let html = '';

  // ═══ HEADER ═══════════════════════════════════════════════════════════════
  const dateStr = new Date(d.generatedAt).toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'});
  html += `<div class="doc-header">
    <div class="label">Portfolio Dashboard</div>
    <h1>${d.investor.name}</h1>
    <div class="sub">Comprehensive portfolio analysis with fitness scoring, insights, and actionable recommendations.</div>
    <div class="meta-row">
      <span class="mc">PAN ${d.investor.pan}</span>
      <span class="mc">Generated ${dateStr}</span>
      <span class="mch">${ps.activeFolioCount} active funds</span>
      <span class="mch">XIRR ${pctPlain(ps.portfolioXIRR)}</span>
    </div>
  </div>`;

  // ═══ 01 OVERVIEW ══════════════════════════════════════════════════════════
  html += `<div class="section">
    <div class="sh"><span class="sn">01</span><span class="st">Portfolio Overview</span></div>
    <div class="dgrid">
      <div class="dc feat"><div class="dcl lt">Current Value</div><div class="dcn lt">${INR(ps.totalMarketValue)}</div><div class="dcs lt">Invested ${INR(ps.totalInvested)}</div></div>
      <div class="dc${ps.totalUnrealisedGain >= 0 ? ' gc' : ' wc'}"><div class="dcl">Unrealised P&L</div><div class="dcn ${ps.totalUnrealisedGain >= 0 ? 'g' : 'r'}">${INR(ps.totalUnrealisedGain)}</div><div class="dcs">${pct(ps.totalUnrealisedGainPct)}</div></div>
      <div class="dc"><div class="dcl">Portfolio XIRR</div><div class="dcn ${ps.portfolioXIRR >= 0 ? 'g' : 'r'}">${pctPlain(ps.portfolioXIRR)}</div><div class="dcs">Time-weighted return</div></div>
    </div>`;

  // Real World Equivalents
  if (db.realWorldEquivalents && db.realWorldEquivalents.length > 0) {
    html += `<span class="sec-label">Your Gains, In Real Terms</span><div class="rwgrid">
      ${db.realWorldEquivalents.map(r => `<div class="rw">
        <div class="rwi">${r.emoji}</div>
        <div class="rwv">${r.displayCount}</div>
        <div class="rwl">${r.label}</div>
        <div class="rws">${r.subtext}</div>
      </div>`).join('')}
    </div>`;
  }
  html += `</div>`;

  // ═══ 02 FITNESS SCORE ═════════════════════════════════════════════════════
  if (fs) {
    html += `<div class="section">
      <div class="sh"><span class="sn">02</span><span class="st">Portfolio Fitness Score</span></div>
      <div class="ss">
        <div class="sst">Wealth Health</div>
        <div class="ssn">${fs.composite} / 100 — ${fs.label}</div>
        <div class="ssd">Composite score across 4 dimensions. Your baseline to beat.</div>
        <div class="sgrid">
          ${['performance','efficiency','structure','discipline'].map(k => {
            const v = fs.dimensions[k];
            const g = scoreGrade(v);
            const labels = {performance:'XIRR vs benchmark',efficiency:'TER + direct plan ratio',structure:'Diversification + overlap',discipline:'SIP regularity + behavior'};
            return `<div><div class="sdl">${k}</div><div class="sdv ${g}">${v}</div><div class="sds">${labels[k]}</div><div class="sdt"><div class="sdf" style="width:${v}%;background:${scoreBar(v)}"></div></div></div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
  }

  // ═══ 03 YOUR NUMBERS ══════════════════════════════════════════════════════
  if (un) {
    html += `<div class="section">
      <div class="sh"><span class="sn">03</span><span class="st">Your Numbers</span></div>
      <p>Numbers that feel personal — derived from your data, framed in a human way.</p>
      <div class="ugrid">
        <div class="uc"><div class="uci">\uD83D\uDCC5</div><div class="ucn">Days Invested</div><div class="uce"><strong>${un.daysInvested.toLocaleString()} days</strong>your money has been working</div><div class="ucw">From your first transaction to today</div></div>
        <div class="uc"><div class="uci">\uD83D\uDCB0</div><div class="ucn">Daily Earnings</div><div class="uce"><strong>${INR(un.dailyEarnings)} / day</strong>on average this year</div><div class="ucw">Total gains \u00F7 days invested this year</div></div>
        <div class="uc"><div class="uci">\uD83E\uDDD8</div><div class="ucn">Investor Type</div><div class="uce"><strong>${un.investorType}</strong></div><div class="ucw">Based on your transaction patterns</div></div>
        <div class="uc"><div class="uci">\uD83D\uDCB8</div><div class="ucn">Cost of Inaction</div><div class="uce"><strong>${INR(un.costOfInaction)}</strong>left on the table</div><div class="ucw">Sum of what-if scenario gaps</div></div>
        ${un.loyaltyBadge ? `<div class="uc"><div class="uci">\uD83C\uDFC5</div><div class="ucn">Loyalty Badge</div><div class="uce"><strong>${un.loyaltyBadge.schemeName.substring(0,35)}</strong></div><div class="ucw">${un.loyaltyBadge.holdingDays} days — your oldest investment</div></div>` : ''}
        ${un.bestDayGain != null ? `<div class="uc"><div class="uci">\uD83C\uDFC6</div><div class="ucn">Best Day Ever</div><div class="uce"><strong>${INR(un.bestDayGain)}</strong></div><div class="ucw">Largest single-day portfolio gain</div></div>` : ''}
      </div>
    </div>`;
  }

  // ═══ 04 BENCHMARK COMPARISON ══════════════════════════════════════════════
  if (db.benchmarkBars && db.benchmarkBars.length > 0) {
    const bars = [...db.benchmarkBars].sort((a,b) => a.xirr - b.xirr);
    const maxXirr = Math.max(...bars.map(b => Math.abs(b.xirr)), 1);
    html += `<div class="section">
      <div class="sh"><span class="sn">04</span><span class="st">Benchmark Comparison</span></div>
      <p>How your portfolio XIRR compares to major benchmarks over the same period.</p>
      <div class="bench-list">
        ${bars.map(b => {
          const w = Math.max(5, (Math.abs(b.xirr) / maxXirr) * 100);
          const col = b.isPortfolio ? '#f59e0b' : b.xirr < 0 ? '#b01a1a' : '#3b82f6';
          const cls = b.isPortfolio ? ' port' : '';
          return `<div class="bench-row">
            <div class="bench-name${cls}">${b.name}</div>
            <div class="bench-bar-wrap"><div class="bench-bar" style="width:${w}%;background:${col}"><span class="bench-val">${b.xirr.toFixed(1)}%</span></div></div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  // ═══ 05 RISK METRICS ══════════════════════════════════════════════════════
  if (rm) {
    html += `<div class="section">
      <div class="sh"><span class="sn">05</span><span class="st">Risk Metrics</span></div>
      <div class="risk-grid">
        <div class="ri"><div class="riv">${rm.portfolioVolatility.toFixed(1)}%</div><div class="ril">Volatility</div></div>
        <div class="ri"><div class="riv" style="color:${rm.sharpeRatio >= 1 ? 'var(--accent)' : rm.sharpeRatio >= 0.5 ? 'var(--warn)' : 'var(--red)'}">${rm.sharpeRatio.toFixed(2)}</div><div class="ril">Sharpe Ratio</div></div>
        <div class="ri"><div class="riv" style="color:${rm.sortinoRatio >= 1 ? 'var(--accent)' : rm.sortinoRatio >= 0.5 ? 'var(--warn)' : 'var(--red)'}">${rm.sortinoRatio.toFixed(2)}</div><div class="ril">Sortino Ratio</div></div>
        <div class="ri"><div class="riv" style="color:var(--red)">${rm.maxDrawdown.toFixed(1)}%</div><div class="ril">Max Drawdown</div></div>
      </div>
    </div>`;
  }

  // ═══ 06 HOLDINGS ══════════════════════════════════════════════════════════
  html += `<div class="section">
    <div class="sh"><span class="sn">06</span><span class="st">Active Holdings</span></div>`;

  // Fund Cards (personality view)
  if (db.fundCards && db.fundCards.length > 0) {
    html += `<span class="sec-label">Fund Personalities</span><div class="fcgrid">
      ${db.fundCards.slice(0, 12).map(f => {
        const gap = f.benchmarkGapPp;
        const badgeCls = gap > 1 ? 'up' : gap < -1 ? 'dn' : 'eq';
        const badgeText = gap > 0 ? '+' + gap.toFixed(1) + 'pp' : gap.toFixed(1) + 'pp';
        return `<div class="fc">
          <div class="fc-badge ${badgeCls}">${badgeText} vs ${f.benchmarkName}</div>
          <div class="fc-name">${f.shortName}</div>
          <div class="fc-meta">${f.personality} · ${f.plan} · ${Math.round(f.holdingDays/30)}mo</div>
          <div class="fc-row">
            <span>${INR(f.marketValueRs)}</span>
            <span class="${f.gainPct >= 0 ? 'pos' : 'neg'}">${pct(f.gainPct)}</span>
            <span>${f.weightPct.toFixed(1)}% wt</span>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  // Folio Table
  const sorted = [...d.activeHoldings].sort((a,b) => b.marketValue - a.marketValue);
  const totalMV = sorted.reduce((s,h) => s + h.marketValue, 0);
  html += `<span class="sec-label">All Funds</span><div class="ft-wrap"><table class="ft">
    <thead><tr><th>Fund</th><th>Value</th><th>Weight</th><th>Return</th><th>Plan</th></tr></thead>
    <tbody>${sorted.map(h => {
      const rcls = h.unrealisedGainPct >= 0 ? 'pos' : 'neg';
      const xCls = h.unrealisedGainPct >= 20 ? 'xh' : h.unrealisedGainPct >= 0 ? 'xm' : 'xl';
      return `<tr>
        <td><div class="fn2">${h.schemeName.substring(0,50)}</div><div class="fnsub">${h.plan} · ${h.weight.toFixed(1)}% of portfolio</div></td>
        <td>${INR(h.marketValue)}</td>
        <td>${h.weight.toFixed(1)}%</td>
        <td class="${rcls}"><span class="xb ${xCls}">${pct(h.unrealisedGainPct)}</span></td>
        <td><span class="xb ${h.plan === 'Direct' ? 'xh' : 'xm'}">${h.plan}</span></td>
      </tr>`;
    }).join('')}
    <tr style="background:var(--surface);"><td><strong>Total</strong></td><td><strong>${INR(totalMV)}</strong></td><td>100%</td><td class="pos"><strong>${pct(ps.totalUnrealisedGainPct)}</strong></td><td></td></tr>
    </tbody>
  </table></div>
  </div>`;

  // ═══ 07 WHAT-IF SCENARIOS ═════════════════════════════════════════════════
  if (d.whatIfScenarios && d.whatIfScenarios.length > 0) {
    html += `<div class="section">
      <div class="sh"><span class="sn">07</span><span class="st">What-If Scenarios</span></div>
      <p>Hypothetical comparisons to help you think about portfolio decisions.</p>
      <div class="wi-grid">
        ${d.whatIfScenarios.map(s => {
          const better = s.difference.userDidBetter;
          const desc = s.description || '';
          const framing = s.dataPointsForNarrative && s.dataPointsForNarrative.framing ? s.dataPointsForNarrative.framing : '';
          return `<div class="wi">
            <div class="wi-name">${s.name}</div>
            ${desc ? `<div class="wi-desc">${desc}</div>` : ''}
            <div class="wi-row"><span class="wi-label">Your Value</span><span>${INR(s.actual.currentValue)}</span></div>
            <div class="wi-row"><span class="wi-label">Hypothetical</span><span>${INR(s.hypothetical.hypotheticalValue)}</span></div>
            <div class="wi-row"><span class="wi-label">Difference</span><span class="${better ? 'pos' : 'neg'}">${INR(s.difference.absoluteAmount)}</span></div>
            <div class="wi-diff ${better ? 'better' : 'worse'}">${better ? 'You did better!' : 'Opportunity: ' + INR(s.difference.absoluteAmount)}</div>
            ${framing ? `<div class="wi-framing">${framing}</div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  // ═══ 08 ASSET ALLOCATION ══════════════════════════════════════════════════
  if (db.assetAllocation && db.assetAllocation.length > 0) {
    const aaColors = {'Equity':'#3b82f6','Debt':'#10b981','Gold':'#f59e0b','Others':'#94a3b8','Cash':'#6366f1'};
    html += `<div class="section">
      <div class="sh"><span class="sn">08</span><span class="st">Asset Allocation & Holdings</span></div>
      <span class="sec-label">Asset Mix</span>
      <div class="aa-bar">
        ${db.assetAllocation.filter(a => a.weight > 0.5).map(a => `<div class="aa-seg" style="width:${a.weight}%;background:${a.color || aaColors[a.assetClass] || '#94a3b8'}">${a.weight > 5 ? a.assetClass + ' ' + a.weight.toFixed(0) + '%' : ''}</div>`).join('')}
      </div>
      <div class="aa-legend">
        ${db.assetAllocation.map(a => `<div class="aa-item"><div class="aa-dot" style="background:${a.color || aaColors[a.assetClass] || '#94a3b8'}"></div>${a.assetClass}: ${INR(a.marketValueRs)} (${a.weight.toFixed(1)}%)</div>`).join('')}
      </div>`;

    // Top Holdings
    if (db.topHoldings && db.topHoldings.holdings.length > 0) {
      html += `<span class="sec-label">Top 10 Holdings by Weight</span>
      <div class="th-list">
        ${db.topHoldings.holdings.map((h, i) => `<div class="th-row">
          <div class="th-rank">${i+1}</div>
          <div class="th-name">${h.companyName}</div>
          <div class="th-wt">${h.portfolioWeight.toFixed(1)}%</div>
        </div>`).join('')}
      </div>
      <div class="co co-note" style="margin-top:14px">
        <strong>Concentration:</strong> Top 5 = ${db.topHoldings.concentrationRisk.top5Weight}% · Top 10 = ${db.topHoldings.concentrationRisk.top10Weight}% · ${db.topHoldings.totalCompaniesCount} companies total
      </div>`;
    }
    html += `</div>`;
  }

  // ═══ 09 INVESTMENT HEATMAP ════════════════════════════════════════════════
  if (db.heatmap && db.heatmap.length > 0) {
    html += `<div class="section">
      <div class="sh"><span class="sn">09</span><span class="st">Investment Heatmap</span></div>
      <p>Monthly investment activity across years. Darker = more invested.</p>
      <div class="ft-wrap"><table class="hm-table">
        <thead><tr><th></th>${MONTH_NAMES.map(m => `<th>${m}</th>`).join('')}<th>Total</th></tr></thead>
        <tbody>${db.heatmap.map(yr => {
          const maxMonth = Math.max(...yr.months.map(m => m.investedRs), 1);
          return `<tr>
            <td style="font-family:'Syne',sans-serif;font-weight:700;font-size:12px;color:var(--ink-2);padding:4px 8px;">${yr.year}</td>
            ${yr.months.map(m => {
              const intensity = m.investedRs > 0 ? Math.max(0.08, m.investedRs / maxMonth) : 0;
              const bg = m.investedRs > 0 ? `rgba(26,71,42,${intensity})` : 'transparent';
              const txt = m.investedRs >= 1000 ? INR(m.investedRs) : '';
              const color = intensity > 0.5 ? '#fff' : 'var(--ink-2)';
              return `<td><div class="hm-cell" style="background:${bg};color:${color}">${txt}</div></td>`;
            }).join('')}
            <td style="font-family:'Syne',sans-serif;font-weight:700;font-size:12px;color:var(--accent);padding:4px 8px;">${INR(yr.totalInvestedRs)}</td>
          </tr>`;
        }).join('')}
        </tbody>
      </table></div>
    </div>`;
  }

  // ═══ 10 INSIGHTS ══════════════════════════════════════════════════════════
  const catConfig = {
    health: {icon:'\uD83D\uDEE1\uFE0F',name:'Portfolio Health & Risk',catColor:'#1a472a',countBg:'#1a472a'},
    tax:    {icon:'\uD83D\uDD10',name:'Tax & ELSS',catColor:'#1a3a5c',countBg:'#1a3a5c'},
    behavioral:{icon:'\uD83E\uDDE0',name:'Behavioral Patterns',catColor:'#5c1a3a',countBg:'#5c1a3a'},
    whatif: {icon:'\uD83D\uDD2E',name:'What-If Scenarios',catColor:'#3a1a5c',countBg:'#3a1a5c'}
  };
  // Each insight gets a vibrant card color
  const CARD_COLORS = {
    // Health - greens, teals
    regular_plan_cost:       {bg:'#FF6B35',fg:'#fff',icon:'\uD83D\uDCB8'},
    overlap_warning:         {bg:'#7B2D8E',fg:'#fff',icon:'\uD83D\uDD0D'},
    fund_house_concentration:{bg:'#2D5F8E',fg:'#fff',icon:'\uD83C\uDFE6'},
    no_nominees:             {bg:'#D63031',fg:'#fff',icon:'\u26A0\uFE0F'},
    fund_manager_change:     {bg:'#6C5CE7',fg:'#fff',icon:'\uD83D\uDC64'},
    benchmark_weekly:        {bg:'#0984E3',fg:'#fff',icon:'\uD83D\uDCC8'},
    best_worst_fund_weekly:  {bg:'#00B894',fg:'#fff',icon:'\uD83C\uDFC6'},
    risk_reward_monthly:     {bg:'#E17055',fg:'#fff',icon:'\u2696\uFE0F'},
    asset_allocation_drift:  {bg:'#636E72',fg:'#fff',icon:'\uD83C\uDFAF'},
    // Tax - blues, purples
    ltcg_boundary_30d:       {bg:'#FDCB6E',fg:'#2d2d2d',icon:'\u23F1\uFE0F'},
    ltcg_exemption_80pct:    {bg:'#E84393',fg:'#fff',icon:'\uD83D\uDCCA'},
    tax_harvest_seasonal:    {bg:'#00CEC9',fg:'#fff',icon:'\u2702\uFE0F'},
    elss_unlock_30d:         {bg:'#6C5CE7',fg:'#fff',icon:'\uD83D\uDD13'},
    // Behavioral - warm
    investor_profile:        {bg:'#0984E3',fg:'#fff',icon:'\uD83E\uDDD8'},
    market_crash_behavioral: {bg:'#D63031',fg:'#fff',icon:'\uD83D\uDCC9'},
    sip_missed:              {bg:'#FF6348',fg:'#fff',icon:'\u274C'},
    portfolio_neglect:       {bg:'#FFA502',fg:'#2d2d2d',icon:'\uD83D\uDCA4'},
    too_many_funds:          {bg:'#A29BFE',fg:'#fff',icon:'\uD83C\uDF0A'},
  };
  // Slot colors for the slideshow
  const SLOT_STYLES = {
    answer:    {bg:'#FDCB6E',fg:'#2d2d2d'},
    education: {bg:'#0984E3',fg:'#fff'},
    your_data: {bg:'#00B894',fg:'#fff'},
    impact:    {bg:'#FF6B35',fg:'#fff'},
    action:    {bg:'#2d3436',fg:'#fff'},
  };

  const totalReady = Object.values(d.insightStates).flat().filter(s => s.status === 'READY').length;
  const totalInsights = Object.values(d.insightStates).flat().length;

  html += `<div class="section">
    <div class="sh"><span class="sn">10</span><span class="st">Insights</span></div>
    <p>${totalReady} findings ready out of ${totalInsights} evaluated. Tap any card to explore the full story.</p>`;

  for (const [cat, states] of Object.entries(d.insightStates)) {
    if (states.length === 0) continue;
    const cfg = catConfig[cat] || {icon:'\u2753',name:cat,catColor:'#333',countBg:'#333'};
    const readyCount = states.filter(s => s.status === 'READY').length;

    html += `<div class="cat-header">
      <span class="cat-icon">${cfg.icon}</span>
      <span class="cat-name">${cfg.name}</span>
      <span class="cat-count" style="background:${cfg.countBg};color:#fff">${readyCount} ready</span>
    </div>
    <div class="ins-grid">`;

    for (const s of states) {
      const cc = CARD_COLORS[s.insightKey] || {bg:'#636E72',fg:'#fff',icon:'\u2753'};
      const hasJourney = d.cardJourneys[s.insightKey];
      const isPending = s.status !== 'READY';
      const cards = d.cardJourneys[s.insightKey];
      // Extract a big number from the journey if available
      let bigNum = '';
      let subText = '';
      if (cards && cards.length > 0) {
        if (cards[0].highlightValue) {
          bigNum = cards[0].highlightValue;
        }
        subText = cards[0].body.substring(0, 80);
      }
      const keyLabel = s.insightKey.replace(/_/g, ' ');
      const onclick = hasJourney && !isPending ? `onclick="openSlideshow('${s.insightKey}')"` : '';

      html += `<div class="ins-card${isPending ? ' pending' : ''}" style="background:${cc.bg};color:${cc.fg}" ${onclick}>
        <div class="ins-badge" style="color:${cc.fg}">${s.relevanceScore}</div>
        <div class="ins-icon">${cc.icon}</div>
        ${bigNum ? `<div class="ins-big">${bigNum}</div>` : ''}
        <div class="ins-title">${cards ? cards[0].title : keyLabel}</div>
        <div class="ins-sub">${subText}${subText.length >= 80 ? '...' : ''}</div>
      </div>`;
    }
    html += `</div>`;
  }
  html += `</div>`;

  // Store journeys globally for the slideshow
  window.__JOURNEYS__ = d.cardJourneys;
  window.__SLOT_STYLES__ = SLOT_STYLES;

  // ═══ 11 ACTIONABLES ═══════════════════════════════════════════════════════
  if (d.actionables && d.actionables.length > 0) {
    html += `<div class="section">
      <div class="sh"><span class="sn">11</span><span class="st">Actionables</span></div>
      <p>Specific actions ranked by relevance to your portfolio.</p>
      ${d.actionables.map(a => {

  if (d.shadowIndex) {

      <div class="sh"><span class="sn">13</span><span class="st">You vs The Index</span></div>

// ═══ SLIDESHOW DIALOG ═════════════════════════════════════════════════════
let currentSlide = 0;
let currentCards = [];
let currentKey = '';

function openSlideshow(key) {
  const cards = window.__JOURNEYS__[key];
  if (!cards || cards.length === 0) return;
  currentCards = cards;
  currentSlide = 0;
  currentKey = key;

  // Create dialog if not exists
  let overlay = document.getElementById('slideshow-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'slideshow-overlay';
    overlay.className = 'dialog-overlay';
    overlay.innerHTML = `<div class="dialog-box">
      <button class="dialog-close" onclick="closeSlideshow()">\u2715</button>
      <div id="slide-container"></div>
    </div>`;
    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeSlideshow(); });
    document.body.appendChild(overlay);
  }
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  renderSlide();
}

function closeSlideshow() {
  const overlay = document.getElementById('slideshow-overlay');
  if (overlay) overlay.classList.remove('open');
  document.body.style.overflow = '';
}

function goSlide(dir) {
  const next = currentSlide + dir;
  if (next < 0 || next >= currentCards.length) return;
  currentSlide = next;
  renderSlide();
}

function renderSlide() {
  const c = currentCards[currentSlide];
  const styles = window.__SLOT_STYLES__;
  const ss = styles[c.slot] || {bg:'#2d3436',fg:'#fff'};
  const total = currentCards.length;
  const slotNames = {answer:'The Answer',education:'Why It Matters',your_data:'Your Data',impact:'The Impact',action:'What To Do'};
  const slotName = slotNames[c.slot] || c.slot;

  const container = document.getElementById('slide-container');
  container.innerHTML = `<div class="slide" style="background:${ss.bg};color:${ss.fg}">
    <div class="slide-step">Card ${currentSlide + 1} of ${total} \u2014 ${currentKey.replace(/_/g, ' ')}</div>
    <div class="slide-slot">${slotName}</div>
    ${c.highlightValue ? `<div class="slide-big">${c.highlightValue}</div><div class="slide-big-label">${c.highlightLabel || ''}</div>` : ''}
    <div class="slide-title">${c.title}</div>
    <div class="slide-body">${c.body}</div>
    <div class="slide-nav">
      <button class="slide-btn" onclick="goSlide(-1)" ${currentSlide === 0 ? 'disabled' : ''} style="border-color:${ss.fg === '#fff' ? 'rgba(255,255,255,.3)' : 'rgba(0,0,0,.2)'};color:${ss.fg}">\u2190</button>
      <div class="slide-dots">${currentCards.map((_, i) => `<div class="slide-dot${i === currentSlide ? ' active' : ''}" style="background:${i === currentSlide ? (ss.fg === '#fff' ? 'rgba(255,255,255,.7)' : 'rgba(0,0,0,.5)') : (ss.fg === '#fff' ? 'rgba(255,255,255,.2)' : 'rgba(0,0,0,.15)')}"></div>`).join('')}</div>
      <button class="slide-btn" onclick="goSlide(1)" ${currentSlide === total - 1 ? 'disabled' : ''} style="border-color:${ss.fg === '#fff' ? 'rgba(255,255,255,.3)' : 'rgba(0,0,0,.2)'};color:${ss.fg}">\u2192</button>
    </div>
  </div>`;
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  const overlay = document.getElementById('slideshow-overlay');
  if (!overlay || !overlay.classList.contains('open')) return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goSlide(1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goSlide(-1); }
  if (e.key === 'Escape') closeSlideshow();
});

    }
